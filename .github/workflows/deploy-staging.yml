# Staging deploy status — WP 0.4 (AUTHORING ONLY, currently inert)
#
# ── Why this workflow deploys nothing ───────────────────────────────────────
# Staging CD is DigitalOcean App Platform's own GitHub integration
# (infra/app.tf: github{ branch = "main", deploy_on_push = true }): a push to
# main makes DO itself rebuild all components, run the PRE_DEPLOY `migrate`
# job (alembic upgrade head — a failed migration aborts the rollout), and
# roll the app. Re-implementing that push-build-deploy loop here would just
# race the platform. So this workflow is an OBSERVER:
#
#   * on push to main   — wait for the deployment DO triggered for this push
#                         and fail the check if it fails, so a red deploy is
#                         visible on the commit in GitHub, not only in the DO
#                         console;
#   * on dispatch       — force a fresh deployment (doctl apps
#                         create-deployment --wait), the manual redeploy lever.
#
# ── How the gate works ──────────────────────────────────────────────────────
# There is no DigitalOcean account yet, so the doctl job is guarded with
#
#     if: vars.DO_DEPLOY_ENABLED == 'true'
#
# `DO_DEPLOY_ENABLED` is a **repository variable** (Settings → Secrets and
# variables → Actions → Variables). It does not exist yet, so the expression
# evaluates to '' == 'true' → false and the job is SKIPPED on every push.
# Nothing here can fail or touch DO until someone explicitly creates that
# variable with the value `true`.
#
# A repository variable is used for the gate (not a secret) because the
# `secrets` context is not available in job-level `if:` expressions, and
# environment-level variables are not resolved until after a job has been
# scheduled into its environment — a repo-level variable is the only thing
# GitHub lets us test before the job starts.
#
# The job additionally declares `environment: staging`: the DO API token is
# read from that GitHub environment (secret DIGITALOCEAN_ACCESS_TOKEN — the
# ONLY GitHub-side secret this stack needs), so flipping the gate on without
# creating the environment fails fast at the doctl step, and any protection
# rules on `staging` are enforced automatically.
#
# ── To arm this workflow (see infra/README.md §Unblocking) ──────────────────
#   1. Apply the Terraform in infra/ (creates the app + database) and
#      authorise the DO GitHub app for this repo.
#   2. Create GitHub environment `staging` with secret
#      DIGITALOCEAN_ACCESS_TOKEN = a DO API token.
#   3. Create repository variable DO_DEPLOY_ENABLED = true.
# ─────────────────────────────────────────────────────────────────────────────

name: Staging deploy status

on:
  push:
    branches: [main]
  workflow_dispatch:

# One watcher/redeploy at a time; queue rather than cancel so we never stop
# observing a rollout mid-flight.
concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read

env:
  APP_NAME: autoinsight-staging # matches spec.name in infra/app.tf

jobs:
  # Always runs (even while the gate is off) so a push to main leaves a
  # visible record of whether the deploy watch ran or was deliberately
  # skipped.
  gate-status:
    runs-on: ubuntu-latest
    steps:
      - name: Report deploy gate state
        run: |
          if [ "${{ vars.DO_DEPLOY_ENABLED }}" = "true" ]; then
            echo "::notice::DO_DEPLOY_ENABLED=true — App Platform deploys this push natively; the watch job will report its outcome."
          else
            echo "::notice::Staging deploy watch SKIPPED: repository variable DO_DEPLOY_ENABLED is not 'true' (no DigitalOcean account/token configured yet). See .github/workflows/deploy-staging.yml header and infra/README.md."
          fi

  staging-deploy:
    # THE GATE — see the header comment. Until the repository variable
    # DO_DEPLOY_ENABLED is created with value 'true', this job never runs.
    if: vars.DO_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: staging # DIGITALOCEAN_ACCESS_TOKEN + protection rules come from here
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Resolve app id
        id: app
        run: |
          APP_ID=$(doctl apps list --output json | jq -r \
            --arg name "$APP_NAME" '.[] | select(.spec.name == $name) | .id')
          if [ -z "$APP_ID" ]; then
            echo "::error::No App Platform app named '$APP_NAME' — has infra/ been applied?"
            exit 1
          fi
          echo "id=$APP_ID" >> "$GITHUB_OUTPUT"

      # Manual lever: workflow_dispatch forces a fresh deployment (e.g. after
      # rotating a secret or when a previous rollout was cancelled). --wait
      # blocks until the rollout finishes and exits non-zero on failure.
      - name: Force redeploy (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: doctl apps create-deployment "${{ steps.app.outputs.id }}" --wait

      # Push path: DO already started a deployment for this push; find it and
      # report its outcome as this check's outcome.
      # TODO(wp0.4-execution): match the deployment to $GITHUB_SHA (cause/
      # commit fields in the deployment object) instead of trusting "newest";
      # good enough until pushes land seconds apart.
      - name: Wait for the App Platform deployment triggered by this push
        if: github.event_name == 'push'
        run: |
          APP_ID="${{ steps.app.outputs.id }}"
          # Give DO a moment to register the deployment for this push.
          sleep 20
          for i in $(seq 1 60); do # ~20 min ceiling
            PHASE=$(doctl apps list-deployments "$APP_ID" --output json | jq -r '.[0].phase')
            echo "attempt $i: newest deployment phase=$PHASE"
            case "$PHASE" in
              ACTIVE)
                echo "::notice::Staging deployment succeeded."
                exit 0 ;;
              ERROR|CANCELED)
                echo "::error::Staging deployment finished in phase $PHASE — see the App Platform console."
                exit 1 ;;
              *)
                sleep 20 ;;
            esac
          done
          echo "::error::Timed out waiting for the staging deployment to finish."
          exit 1
