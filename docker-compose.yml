services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: autoinsight
      POSTGRES_PASSWORD: autoinsight
      POSTGRES_DB: autoinsight
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoinsight -d autoinsight"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
